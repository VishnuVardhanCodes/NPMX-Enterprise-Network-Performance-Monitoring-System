<VirtualHost *:80>
    ServerName npm-pro.local
    DocumentRoot /var/www/npm-pro/frontend/dist

    <Directory /var/www/npm-pro/frontend/dist>
        AllowOverride All
        Require all granted
        FallbackResource /index.html
    </Directory>

    # Proxy API Requests to Flask Backend
    ProxyPass /api http://127.0.0.0:5000/
    ProxyPassReverse /api http://127.0.0.0:5000/

    ErrorLog ${APACHE_LOG_DIR}/npm-pro_error.log
    CustomLog ${APACHE_LOG_DIR}/npm-pro_access.log combined
</VirtualHost>
